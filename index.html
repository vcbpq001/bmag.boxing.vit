<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Image Dashboard</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 6px 10px;
      border-radius: 6px;
      font: 13px Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="liveImg" alt="Live Image">
    <div class="status" id="status">Đang tải...</div>
  </div>

  <script>
    const BASE_URL = "https://raw.githubusercontent.com/TEN_USER/TEN_REPO/main/live.jpg";

    const img = document.getElementById("liveImg");
    const status = document.getElementById("status");

    function refreshImage() {
      const url = BASE_URL + "?t=" + Date.now();
      const test = new Image();

      test.onload = function () {
        img.src = url;
        status.textContent = "Cập nhật: " + new Date().toLocaleString("vi-VN");
      };

      test.onerror = function () {
        status.textContent = "Lỗi tải ảnh: " + new Date().toLocaleString("vi-VN");
      };

      test.src = url;
    }

    refreshImage();
    setInterval(refreshImage, 60000);
  </script>
</body>
</html>
