<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Image Dashboard</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="liveImg" alt="Live Image">
  </div>

  <script>
    const img = document.getElementById("liveImg");
    const BASE_URL = "https://raw.githubusercontent.com/vcbpq001/bmag.boxing.vit/main/NOW.JPG";

    function refreshImage() {
      img.src = BASE_URL + "?t=" + Date.now();
    }

    refreshImage();
    setInterval(refreshImage, 60000);
  </script>
</body>
</html>
