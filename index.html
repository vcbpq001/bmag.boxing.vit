<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Image Dashboard</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .status {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="liveImg" alt="Live Image">
    <div class="status" id="status">Đang tải...</div>
  </div>

  <script>
    const FILE_ID = "15n1xcSV_z5gpjswntUMiQ2GY9-DUSou8";

    // Dùng thumbnail endpoint ổn định hơn uc?export=view
    const BASE_URL = `https://drive.google.com/thumbnail?id=${FILE_ID}&sz=w4000`;

    const img = document.getElementById("liveImg");
    const status = document.getElementById("status");

    function refreshImage() {
      const newUrl = `${BASE_URL}&t=${Date.now()}`;

      const preloader = new Image();

      preloader.onload = function () {
        img.src = newUrl;
        status.textContent = "Cập nhật: " + new Date().toLocaleString("vi-VN");
      };

      preloader.onerror = function () {
        status.textContent = "Không tải được ảnh: " + new Date().toLocaleString("vi-VN");
      };

      preloader.src = newUrl;
    }

    refreshImage();
    setInterval(refreshImage, 60000);
  </script>
</body>
</html>
